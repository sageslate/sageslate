input RealmCreateInput {
  id: String!

  name: String!
  folderName: String!
}

type Realm {
  id: ID!

  name: String!
  folderName: String!

  createdAt: DateTime!
  updatedAt: DateTime!
}

type AdminMutation {
  createRealm(input: RealmCreateInput!): Realm!
}

type AdminQuery {
  realms: [Realm!]!
}
